<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>English Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --c1:#FF8C42; --c2:#4CAF50; --c3:#2196F3; --c4:#7B52AB; --c5:#1A237E;
  --bg1:#FFF8F2; --bg2:#F2FBF4; --bg3:#F0F7FF; --bg4:#F5F0FF; --bg5:#0D1117;
  --white:#fff; --shadow:0 4px 20px rgba(0,0,0,.10);
  --r:18px; --rsm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:#111;color:#222;font-size:14px}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(145deg,#0a0020,#001040,#000a20);
  display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .7s}
#splash.out{opacity:0;pointer-events:none}
.sp-icon{font-size:72px;margin-bottom:20px;animation:spFloat 2s ease-in-out infinite}
@keyframes spFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.sp-title{font-family:'Fredoka One',cursive;font-size:32px;
  background:linear-gradient(135deg,#fff,#90caf9,#ffd54f);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;letter-spacing:2px}
.sp-sub{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:3px;margin-bottom:36px}
.sp-bar{width:200px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.sp-fill{height:100%;width:0;border-radius:2px;
  background:linear-gradient(90deg,#4fc3f7,#aed581,#ffd54f);
  animation:spFill 2s ease forwards}
@keyframes spFill{to{width:100%}}

/* APP */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* HEADER */
.hdr{padding:11px 14px 9px;display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:linear-gradient(135deg,#0d1117,#1a2340);border-bottom:1px solid #2a3a5a}
.hdr-logo{font-family:'Fredoka One',cursive;font-size:20px;
  background:linear-gradient(135deg,#90caf9,#4fc3f7,#b39ddb);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.xp-col{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.xp-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.65)}
.xp-bar{width:72px;height:5px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#4fc3f7,#aed581);
  transition:width .8s ease}
.stg-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:#fff;font-size:11px;font-weight:800;padding:4px 11px;border-radius:20px}

/* ROADMAP */
.roadmap{display:flex;padding:7px 10px 5px;gap:5px;flex-shrink:0;
  background:#0d1117;border-bottom:1px solid #1e2d4a;overflow-x:auto;scrollbar-width:none}
.roadmap::-webkit-scrollbar{display:none}
.rd-step{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 10px;border-radius:12px;cursor:pointer;border:1.5px solid transparent;
  font-size:10px;font-weight:800;color:rgba(255,255,255,.35);transition:all .2s;min-width:54px}
.rd-step.done{color:rgba(255,255,255,.5)}
.rd-step.cur{border-color:rgba(255,255,255,.5);color:#fff;background:rgba(255,255,255,.08)}
.rd-step.lock{opacity:.25;cursor:not-allowed}
.rd-icon{font-size:20px}

/* SPEED ROW */
.spd-row{display:flex;gap:5px;padding:5px 10px 4px;background:#0d1117;
  border-bottom:1px solid #1e2d4a;align-items:center;flex-shrink:0}
.spd-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.4)}
.spd-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;
  color:rgba(255,255,255,.5);font-family:inherit;transition:all .2s}
.spd-btn.on{background:#2196F3;border-color:#2196F3;color:#fff}
.auto-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:rgba(255,255,255,.4)}
.tog{width:34px;height:18px;border-radius:9px;border:none;cursor:pointer;
  position:relative;transition:background .2s;background:rgba(255,255,255,.15)}
.tog.on{background:#2196F3}
.tog::after{content:'';position:absolute;top:2px;left:2px;
  width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
.tog.on::after{transform:translateX(16px)}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;
  gap:11px;background:#0d1117;scrollbar-width:thin;scrollbar-color:#1e2d4a transparent}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:2px}

.row{display:flex;gap:8px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.row.u{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:17px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.bbl{max-width:86%;padding:11px 14px;border-radius:16px;
  font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.row.ai .bbl{background:#1a2340;border:1.5px solid #2a3a5a;color:#d0e4ff;
  border-radius:4px 16px 16px 16px;box-shadow:var(--shadow)}
.row.u .bbl{background:linear-gradient(135deg,#1565C0,#0a1840);
  color:#fff;border-radius:16px 4px 16px 16px}

/* ACTION BTNS on message */
.acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.act{display:inline-flex;align-items:center;gap:4px;border:none;border-radius:9px;
  padding:4px 11px;font-size:11px;font-weight:800;cursor:pointer;
  font-family:inherit;transition:all .2s;
  background:rgba(64,128,255,.15);color:#64b5f6}
.act:active{opacity:.7}
.act.grn{background:rgba(76,175,80,.15);color:#81c784}

/* WAVEFORM */
.wv{display:flex;align-items:center;gap:2px;height:13px}
.wb{width:3px;border-radius:2px;background:currentColor;opacity:.8}
.wb.a{animation:wvA .7s ease-in-out infinite}
.wb:nth-child(1){height:4px}.wb:nth-child(2){height:11px;animation-delay:.1s}
.wb:nth-child(3){height:7px;animation-delay:.2s}.wb:nth-child(4){height:13px;animation-delay:.3s}
.wb:nth-child(5){height:8px;animation-delay:.4s}
@keyframes wvA{0%,100%{transform:scaleY(.3);opacity:.3}50%{transform:scaleY(1);opacity:1}}

/* TYPING */
.typing-row{display:flex;gap:8px;align-items:center}
.typing-dots{padding:12px 16px;border-radius:4px 16px 16px 16px;
  background:#1a2340;border:1.5px solid #2a3a5a;display:flex;gap:5px}
.typing-dots span{width:8px;height:8px;border-radius:50%;background:#4fc3f7;
  animation:td .9s infinite}
.typing-dots span:nth-child(2){animation-delay:.25s}
.typing-dots span:nth-child(3){animation-delay:.5s}
@keyframes td{0%,80%,100%{transform:scale(.4);opacity:.2}40%{transform:scale(1.1);opacity:1}}

/* SYSTEM MSG */
.sys-msg{text-align:center;font-size:11px;color:rgba(255,255,255,.3);padding:3px 0}

/* PRONUNCIATION CARD */
.pron-card{background:#1a1040;border:1.5px solid #3a2060;border-radius:14px;
  padding:13px 15px;margin-top:9px}
.pron-title{font-size:11px;font-weight:800;color:#9575cd;margin-bottom:8px;letter-spacing:.5px}
.pron-target{font-size:18px;font-weight:900;color:#b39ddb;margin-bottom:9px;line-height:1.4}
.pron-btn{width:100%;border:none;border-radius:12px;padding:10px;
  font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.pron-btn.idle{background:linear-gradient(135deg,#4a148c,#7b1fa2);color:#fff;
  box-shadow:0 3px 12px rgba(123,31,162,.3)}
.pron-btn.rec{background:linear-gradient(135deg,#b71c1c,#e53935);color:#fff;
  animation:recP .8s infinite alternate}
@keyframes recP{from{box-shadow:0 0 0 0 rgba(229,57,53,.4)}to{box-shadow:0 0 0 8px rgba(229,57,53,0)}}
.pron-btn.done{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff}
.pron-score{text-align:center;margin-top:10px}
.pron-num{font-size:42px;font-weight:900;line-height:1}
.pron-bar{height:8px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;margin-top:7px}
.pron-fill{height:100%;border-radius:5px;transition:width 1s ease}
.pron-fill.hi{background:linear-gradient(90deg,#2e7d32,#66bb6a)}
.pron-fill.md{background:linear-gradient(90deg,#e65100,#ffa726)}
.pron-fill.lo{background:linear-gradient(90deg,#b71c1c,#ef5350)}

/* STATUS BARS */
.status-bar{display:none;align-items:center;gap:8px;
  padding:5px 12px;flex-shrink:0;background:#111827;border-top:1px solid #1e2d4a}
.status-bar.show{display:flex}
.s-lbl{font-size:11px;font-weight:700;flex:1;color:rgba(255,255,255,.6);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-clr{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;
  border:none;background:rgba(239,83,80,.2);color:#ef9a9a;font-family:inherit}
.img-th{width:36px;height:36px;object-fit:cover;border-radius:7px;border:1.5px solid #2a3a5a;flex-shrink:0}

/* URL BAR */
.url-bar{display:none;padding:5px 10px;gap:7px;align-items:center;flex-shrink:0;
  background:#111827;border-top:1px solid #1e2d4a}
.url-bar.show{display:flex}
.url-inp{flex:1;background:#1a2340;border:1.5px solid #2a3a5a;border-radius:8px;
  padding:7px 11px;font-size:13px;outline:none;color:#d0e4ff;font-family:inherit}
.url-inp:focus{border-color:#4fc3f7}
.url-inp::placeholder{color:rgba(255,255,255,.25)}
.url-go{border:none;border-radius:8px;padding:7px 14px;background:#2196F3;
  color:#fff;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit}

/* INPUT BAR */
.inp-bar{padding:7px 9px 11px;display:flex;gap:6px;align-items:flex-end;flex-shrink:0;
  background:#0d1117;border-top:1.5px solid #1e2d4a}
.tool{width:40px;height:40px;border-radius:11px;font-size:18px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.tool:active{transform:scale(.9)}
.tool.rec{background:linear-gradient(135deg,#b71c1c,#e53935)!important;
  color:#fff!important;border-color:#e53935!important;animation:recP .8s infinite alternate}
.tool.on{background:rgba(33,150,243,.2)!important;border-color:#2196F3!important;color:#4fc3f7!important}
.ta{flex:1;background:#1a2340;border:1.5px solid #2a3a5a;border-radius:12px;
  padding:9px 13px;font-size:14px;resize:none;outline:none;line-height:1.5;
  max-height:96px;min-height:40px;font-family:inherit;color:#d0e4ff;transition:border-color .2s}
.ta:focus{border-color:#4fc3f7}
.ta::placeholder{color:rgba(255,255,255,.25)}
.go{width:44px;height:40px;border-radius:12px;border:none;color:#fff;font-size:19px;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1565C0,#0a0e40);
  box-shadow:0 4px 14px rgba(21,101,192,.4);transition:all .2s}
.go:active{opacity:.8;transform:scale(.93)}
.go:disabled{background:#1e2d4a!important;box-shadow:none!important;color:rgba(255,255,255,.2)!important}

/* MODALS base */
.modal{display:none;position:fixed;inset:0;z-index:7000;flex-direction:column}
.modal.show{display:flex}
.modal-hdr{padding:13px 15px;display:flex;align-items:center;gap:10px;flex-shrink:0;color:#fff}
.modal-title{font-size:17px;font-weight:900;flex:1}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;
  width:34px;height:34px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.modal-body{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.1) transparent}

/* WORD MODAL */
#wrd-modal{background:linear-gradient(145deg,#0a0020,#100030)}
#wrd-modal .modal-hdr{background:linear-gradient(135deg,#4a148c,#7b1fa2)}
.wrd-cat-bar{display:flex;gap:6px;padding:7px 11px;overflow-x:auto;
  background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;scrollbar-width:none}
.wrd-cat-bar::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;border:1.5px solid rgba(255,255,255,.15);border-radius:16px;
  padding:5px 12px;font-size:11px;font-weight:800;cursor:pointer;
  background:transparent;color:rgba(255,255,255,.5);font-family:inherit;transition:all .2s}
.cat-btn.on{background:#7b1fa2;border-color:#7b1fa2;color:#fff}
.wrd-scene{display:flex;flex-direction:column;align-items:center;padding:20px 14px;
  text-align:center;flex:1}
.wrd-emoji{font-size:96px;margin-bottom:12px;animation:wrdFloat 2s ease-in-out infinite;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.4))}
@keyframes wrdFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wrd-word{font-family:'Fredoka One',cursive;font-size:44px;color:#ce93d8;
  margin-bottom:5px;text-shadow:0 3px 0 rgba(0,0,0,.3)}
.wrd-pron{font-size:16px;color:#9575cd;margin-bottom:10px;font-style:italic}
.wrd-sent{font-size:18px;font-weight:700;color:#e8d5ff;line-height:1.65;
  margin-bottom:7px;max-width:300px}
.wrd-jp{font-size:13px;color:#b39ddb;font-weight:600}
.wrd-cat-lbl{font-size:11px;font-weight:800;color:#9575cd;
  background:rgba(123,31,162,.2);border-radius:7px;padding:3px 10px;margin-bottom:10px}
.wrd-learned{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);margin-top:14px}
.wrd-btns{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.wrd-btn{border:none;border-radius:18px;padding:11px 20px;font-size:14px;font-weight:800;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;transition:all .2s}
.wrd-btn:active{transform:scale(.95)}
.wrd-btn.play{background:linear-gradient(135deg,#6a1b9a,#ab47bc);color:#fff;
  box-shadow:0 4px 14px rgba(106,27,154,.35)}
.wrd-btn.next{background:linear-gradient(135deg,#1b5e20,#43a047);color:#fff;
  box-shadow:0 4px 14px rgba(27,94,32,.3)}
.wrd-btn.rep{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);color:#ce93d8}
.wrd-dots{display:flex;gap:5px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.wrd-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.wrd-dot.done{background:#7b1fa2}
.wrd-dot.cur{background:#ce93d8;transform:scale(1.5)}
.wrd-story-btn{margin-top:12px;border:none;border-radius:14px;padding:10px 20px;
  background:linear-gradient(135deg,#1a237e,#283593);color:#fff;
  font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;
  box-shadow:0 3px 12px rgba(26,35,126,.4);transition:all .2s}
.wrd-story-btn:active{transform:scale(.95)}
.wrd-story-area{display:none;margin-top:12px;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.1);border-radius:13px;padding:13px 14px;
  font-size:14px;font-weight:600;line-height:1.75;color:#d0e4ff;text-align:left;width:100%;max-width:320px}

/* SRS MODAL */
#srs-modal{background:linear-gradient(145deg,#051020,#0a1830)}
#srs-modal .modal-hdr{background:linear-gradient(135deg,#0d47a1,#1976d2)}
.srs-stats{display:flex;gap:8px;margin-bottom:13px}
.srs-stat{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:13px 10px;text-align:center}
.srs-n{font-size:26px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,#90caf9,#4fc3f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.srs-l{font-size:11px;color:rgba(255,255,255,.4);font-weight:700;margin-top:4px}
.srs-start{width:100%;border:none;border-radius:14px;padding:13px;
  background:linear-gradient(135deg,#0d47a1,#1976d2);color:#fff;
  font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 14px rgba(13,71,161,.4);margin-bottom:13px}
.srs-list{display:flex;flex-direction:column;gap:7px}
.srs-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:9px}
.srs-word{font-size:15px;font-weight:900;color:#90caf9;flex:1}
.srs-jp{font-size:12px;color:rgba(255,255,255,.4)}
.srs-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:7px;white-space:nowrap}
.srs-badge.now{background:rgba(229,57,53,.2);color:#ef9a9a}
.srs-badge.tod{background:rgba(255,167,38,.2);color:#ffcc80}
.srs-badge.lat{background:rgba(76,175,80,.2);color:#a5d6a7}
.srs-card{background:rgba(255,255,255,.05);border:1.5px solid rgba(144,202,249,.2);
  border-radius:16px;padding:24px 18px;text-align:center;margin-bottom:12px}
.srs-q{font-size:34px;font-weight:900;color:#90caf9;margin-bottom:8px}
.srs-hint{font-size:13px;color:rgba(255,255,255,.35)}
.srs-see{border:none;border-radius:11px;padding:10px 22px;margin-top:12px;
  background:linear-gradient(135deg,#0d47a1,#1976d2);color:#fff;
  font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.srs-ans{display:none;background:rgba(255,255,255,.04);border:1px solid rgba(144,202,249,.15);
  border-radius:13px;padding:15px;margin-bottom:12px}
.srs-ans.show{display:block}
.srs-aw{font-size:22px;font-weight:900;color:#90caf9;margin-bottom:5px}
.srs-aj{font-size:14px;color:#b0bec5;margin-bottom:4px}
.srs-ae{font-size:12px;color:rgba(255,255,255,.35);font-style:italic}
.srs-rate{display:flex;gap:7px;margin-top:11px}
.srs-rb{flex:1;border:none;border-radius:12px;padding:11px 6px;
  font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.srs-rb:active{transform:scale(.96)}
.srs-rb.h{background:rgba(229,57,53,.18);color:#ef9a9a}
.srs-rb.o{background:rgba(255,167,38,.18);color:#ffcc80}
.srs-rb.e{background:rgba(76,175,80,.18);color:#a5d6a7}

/* REPORT PANEL */
.rep-panel{display:none;flex-direction:column;gap:11px;overflow-y:auto;
  padding:13px 11px;background:#0d1117;flex:1}
.rep-panel.show{display:flex}
.rep-card{background:#1a2340;border:1.5px solid #2a3a5a;border-radius:var(--r);padding:17px 15px}
.rep-card-title{font-size:15px;font-weight:800;margin-bottom:13px;color:#d0e4ff;
  display:flex;align-items:center;gap:8px}
.rep-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rep-stat{background:rgba(255,255,255,.05);border-radius:11px;padding:13px 9px;text-align:center;
  border:1px solid rgba(255,255,255,.07)}
.rep-n{font-size:26px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,#90caf9,#80deea);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rep-l{font-size:11px;color:rgba(255,255,255,.4);font-weight:700;margin-top:4px}
.sk-row{margin-bottom:11px}
.sk-labels{display:flex;justify-content:space-between;font-size:12px;

function loadProgress() {
  try {
    var s = localStorage.getItem('ej2_prog');
    if (s) { var d = JSON.parse(s); stage = d.s || 1; xp = d.x || 0; }
  } catch(e) {}
  updateXP();
}

function saveProgress() {
  localStorage.setItem('ej2_prog', JSON.stringify({s:stage, x:xp}));
}

/* ─────────────────────────────────────────
   STAGE SYSTEM
───────────────────────────────────────── */
function renderRoadmap() {
  var html = '';
  STAGES.forEach(function(s) {
    var cl = s.id < stage ? 'done' : s.id === stage ? 'cur' : 'lock';
    html += '<div class="rd-step ' + cl + '" onclick="' + (s.id <= stage ? 'jumpStage(' + s.id + ')' : 'void 0') + '">' +
      '<span class="rd-icon">' + s.e + '</span>' +
      '<span>' + s.name + '</span>' +
    '</div>';
  });
  document.getElementById('roadmap').innerHTML = html;
}

function renderChips() {
  var cfg = STAGES[stage-1];
  var html = cfg.chips.map(function(c) {
    return '<button onclick="chipSend(\'' + c.replace(/'/g,"\\'") + '\')" style="' +
      'flex-shrink:0;border:1.5px solid rgba(255,255,255,.15);border-radius:16px;' +
      'padding:5px 12px;font-size:11px;font-weight:800;cursor:pointer;' +
      'background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-family:inherit;">' +
      c + '</button>';
  }).join('');
  document.getElementById('chips-bar').innerHTML = html;
}

function chipSend(text) {
  document.getElementById('ta').value = text;
  doSend();
}

function jumpStage(s) {
  if (s > stage) return;
  stage = s; xp = 0;
  saveProgress(); renderRoadmap(); renderChips(); updateXP();
  appendSys('Stage ' + s + ' 「' + STAGES[s-1].name + '」に戻りました');
}

function addXP(n) {
  xp += n;
  updateXP();
  saveProgress();
  showXPPop(n);
  playCoin();
  if (stage < 5 && xp >= STAGES[stage-1].xpMax) {
    var ns = stage + 1;
    setTimeout(function() { showLvlUp(ns); }, 700);
  }
}

function updateXP() {
  var cfg = STAGES[stage-1];
  var pct = stage < 5 ? Math.min(xp / cfg.xpMax * 100, 100) : 100;
  document.getElementById('xp-fill').style.width = pct + '%';
  var left = stage < 5 ? xp + ' / ' + cfg.xpMax + ' XP' : xp + ' XP 🏆';
  document.getElementById('xp-lbl').textContent = left;
  document.getElementById('stg-badge').textContent = cfg.badge;
}

function showLvlUp(ns) {
  var prev = STAGES[stage-1];
  document.getElementById('lu-e').textContent = prev.luE;
  document.getElementById('lu-t').textContent = prev.luT;
  document.getElementById('lu-s').textContent = prev.luS;
  document.getElementById('lu-btn').style.background = prev.luC;
  document.getElementById('lvlup').classList.add('show');
  window._pendingStage = ns;
  xp = 0; saveProgress();
  playLevelUp();
  launchConfetti(window.innerWidth/2, 200, 80);
}

function closeLvlUp() {
  document.getElementById('lvlup').classList.remove('show');
  if (window._pendingStage) {
    stage = window._pendingStage;
    window._pendingStage = null;
    chatLog = [];
    saveProgress(); renderRoadmap(); renderChips(); updateXP();
    appendSys('🎉 ' + STAGES[stage-1].name + ' ステージへようこそ！');
    appendAI(STAGES[stage-1].name + ' stage — ' + STAGES[stage-1].badge + ' に到達しました！', false);
  }
}

function setMode(mode) {
  curMode = mode;
  setModeTab(mode);
  var rep = document.getElementById('rep-panel');
  var msgs = document.getElementById('msgs');
  if (mode === 'report') {
    rep.classList.add('show');
    msgs.style.display = 'none';
    renderReport();
  } else {
    rep.classList.remove('show');
    msgs.style.display = 'flex';
  }
}

function setModeTab(mode) {
  document.querySelectorAll('#mode-tabs .spd-btn').forEach(function(b) {
    b.classList.toggle('on', b.dataset.mode === mode);
  });
}

/* ─────────────────────────────────────────
   SEND
───────────────────────────────────────── */
async function doSend() {
  if (busy) return;
  var ta = document.getElementById('ta');
  var text = ta.value.trim();
  if (!text && !imgData) return;
  ta.value = ''; resizeTA(ta);

  var userText = text;
  if (curUrl) userText += '\n[URL: ' + curUrl + ']';
  if (useSearch) userText = '[Google Search] ' + userText;

  appendUser(text, imgData);
  busy = true;
  document.getElementById('go-btn').disabled = true;

  var typing = appendTyping();
  try {
    var sys = STAGES[stage-1].modes[curMode] || STAGES[stage-1].modes.chat;
    // inject learned words
    var lw = getLearned(8);
    if (lw.length > 0) {
      sys += '\n\n[MEMORY] Learned words: ' + lw.join(', ') + '. Naturally use 1-2 in your response.';
    }
    var media = imgData ? [{base64: imgData, type:'image/jpeg'}] : null;
    var resp = await callGemini(sys, userText, useSearch, curUrl, media);
    typing.remove();
    chatLog.push({role:'user', content:userText});
    chatLog.push({role:'assistant', content:resp});
    appendAI(resp, true);
    if (imgData) clearImg();
    addXP(text.length > 20 ? 15 : 8);
  } catch(err) {
    typing.remove();
    appendAI('⚠️ エラー: ' + err.message + '\nFirebase Functionsが起動しているか確認してください。');
  }
  busy = false;
  document.getElementById('go-btn').disabled = false;
}

/* ─────────────────────────────────────────
   MESSAGE RENDERING
───────────────────────────────────────── */
function appendUser(text, img) {
  var area = document.getElementById('msgs');
  var row = document.createElement('div');
  row.className = 'row u';
  var av = document.createElement('div');
  av.className = 'av'; av.textContent = '👤';
  var bbl = document.createElement('div');
  bbl.className = 'bbl';
  if (img) {
    var im = document.createElement('img');
    im.src = img;
    im.style.cssText = 'max-width:200px;border-radius:9px;display:block;border:1.5px solid rgba(255,255,255,.2)';
    bbl.appendChild(im);
    if (text) { var p = document.createElement('p'); p.style.marginTop='6px'; p.textContent=text; bbl.appendChild(p); }
  } else {
    bbl.textContent = text;
  }
  row.appendChild(bbl); row.appendChild(av);
  area.appendChild(row); area.scrollTop = area.scrollHeight;
}

function appendAI(text, withActs) {
  var area = document.getElementById('msgs');
  var row = document.createElement('div');
  row.className = 'row ai';
  var av = document.createElement('div');
  av.className = 'av'; av.textContent = STAGES[stage-1].e;
  var bbl = document.createElement('div');
  bbl.className = 'bbl';

  var html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(255,255,255,.1);padding:1px 5px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/(🇯🇵[^\n]*)/g,'<span style="color:#80deea;font-size:13px">$1</span>');
  bbl.innerHTML = html;

  if (withActs) {
    var acts = document.createElement('div');
    acts.className = 'acts';
    var spk = document.createElement('button');
    spk.className = 'act';
    spk.innerHTML = '<div class="wv"><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div></div> 読上';
    var captureText = text;
    spk.onclick = function() { speakText(captureText, spk); };
    acts.appendChild(spk);
    var cp = document.createElement('button');
    cp.className = 'act grn'; cp.textContent = '📋 コピー';
    cp.onclick = function() {
      navigator.clipboard.writeText(captureText).then(function() {
        cp.textContent = '✅'; setTimeout(function() { cp.textContent = '📋 コピー'; }, 1400);
      });
    };
    acts.appendChild(cp);
    bbl.appendChild(acts);
    if (autoSpeak) speakText(text, null);
    // stage 1-3: auto pronunciation card
    if (stage <= 3) {
      var m = text.match(/"([A-Za-z][a-zA-Z ',!?-]{3,38}[.!?]?)"/) ||
              text.match(/^([A-Z][a-zA-Z ,!']{4,38}[.!?])/m);
      if (m && m[1]) {
        setTimeout(function() { appendPronCard(m[1].trim()); }, 500);
      }
    }
  }

  row.appendChild(av); row.appendChild(bbl);
  area.appendChild(row); area.scrollTop = area.scrollHeight;
}

function appendTyping() {
  var area = document.getElementById('msgs');
  var row = document.createElement('div');
  row.className = 'typing-row';
  var av = document.createElement('div');
  av.className = 'av'; av.textContent = STAGES[stage-1].e;
  var dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(av); row.appendChild(dots);
  area.appendChild(row); area.scrollTop = area.scrollHeight;
  return row;
}

function appendSys(text) {

function appendPronCard(target) {
  var area = document.getElementById('msgs');
  var id = 'pc' + Date.now();
  var div = document.createElement('div');
  div.className = 'pron-card'; div.id = id;
  div.innerHTML = '<div class="pron-title">🎤 発音チャレンジ</div>' +
    '<div class="pron-target">' + target + '</div>' +
    '<button class="pron-btn idle" id="' + id + 'b" onclick="startPron(\'' +
    target.replace(/'/g,"\\'") + '\',\'' + id + '\')">🎤 発音してみよう！</button>' +
    '<div id="' + id + 'r"></div>';
  area.appendChild(div); area.scrollTop = area.scrollHeight;
}

function startPron(target, id) {
  var btn = document.getElementById(id + 'b');
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Chrome / Safari で音声認識が使えます'); return;
  }
  if (pronunOn) { if (pronunRec) pronunRec.stop(); return; }
  pronunOn = true;
  btn.className = 'pron-btn rec'; btn.textContent = '🔴 録音中...';
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  pronunRec = new SR(); pronunRec.lang = 'en-US'; pronunRec.maxAlternatives = 1;
  pronunRec.onresult = function(e) {
    var heard = e.results[0][0].transcript.toLowerCase().trim();
    var conf = e.results[0][0].confidence || 0.5;
    scorePron(target, heard, conf, id);
  };
  pronunRec.onerror = function() {
    pronunOn = false; btn.className = 'pron-btn idle'; btn.textContent = '🎤 もう一度';
  };
  pronunRec.onend = function() { pronunOn = false; };
  pronunRec.start();
}

function scorePron(target, heard, conf, id) {
  var btn = document.getElementById(id + 'b');
  btn.className = 'pron-btn done'; btn.textContent = '✅ 採点完了';
  var t = target.toLowerCase().replace(/[^a-z ]/g,'').trim();
  var h = heard.toLowerCase().replace(/[^a-z ]/g,'').trim();
  var score;
  if (h === t) { score = 100; }
  else {
    var longer = t.length > h.length ? t : h;
    var shorter = t.length <= h.length ? t : h;
    var m = 0; shorter.split('').forEach(function(c,i) { if (longer[i]===c) m++; });
    score = Math.round((m/Math.max(longer.length,1))*60 + conf*100*0.4);
    score = Math.max(5, Math.min(99, score));
  }
  var emoji = score >= 85 ? '🌟' : score >= 65 ? '👍' : '💪';
  var msg = score >= 85 ? 'Excellent!' : score >= 65 ? 'Good job!' : 'Keep practicing!';
  var cls = score >= 85 ? 'hi' : score >= 65 ? 'md' : 'lo';
  var res = document.getElementById(id + 'r');
  res.innerHTML = '<div class="pron-score"><div class="pron-num">' + emoji + ' ' + score + '点</div>' +
    '<div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px">' + msg + '</div>' +
    '<div class="pron-bar"><div class="pron-fill ' + cls + '" style="width:' + score + '%"></div></div>' +
    '<div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:5px">' +
    '認識: "' + heard + '" → 目標: "' + target + '"</div>' +
    '<button onclick="startPron(\'' + target.replace(/'/g,"\\'") + '\',\'' + id + '\')" style="' +
    'margin-top:8px;border:none;border-radius:9px;padding:6px 14px;font-size:12px;font-weight:800;' +
    'cursor:pointer;background:rgba(123,31,162,.2);color:#ce93d8;font-family:inherit">🔄 もう一度</button>' +
    '</div>';
  addXP(Math.round(score/10));
  if (score >= 70) srsAdd(target, '', '');
  if (score >= 85) { flashCorrect(); launchConfetti(window.innerWidth/2, window.innerHeight/2, 28); }
}

function getVoice() {
  var vs = speechSynthesis.getVoices();
  return vs.find(function(v) { return v.lang.startsWith('en') && /Google|Samantha|Karen|Moira/.test(v.name); }) ||
         vs.find(function(v) { return v.lang.startsWith('en-US'); }) ||
         vs.find(function(v) { return v.lang.startsWith('en'); });
}

function speakText(text, btn) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var clean = text
    .replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1')
    .replace(/🇯🇵[^\n]*/g,'').replace(/[^\x00-\x7F\u3040-\u30FF\u4E00-\u9FFF]/g,' ')
    .replace(/\s+/g,' ').trim().substring(0,500);
  var u = new SpeechSynthesisUtterance(clean);
  u.lang = 'en-US'; u.rate = spd; u.pitch = 1.05;
  var v = getVoice(); if (v) u.voice = v;
  if (btn) {
    u.onstart = function() { btn.querySelectorAll('.wb').forEach(function(b){b.classList.add('a');}); };
    u.onend = u.onerror = function() { btn.querySelectorAll('.wb').forEach(function(b){b.classList.remove('a');}); };
  }
  speechSynthesis.speak(u);
}

function setSpd(s, el) {
  spd = s;

function wrdRender() {

  document.getElementById('wrd-word').textContent = d.w;
  document.getElementById('wrd-pron').textContent = d.p;
  document.getElementById('wrd-sent').textContent = d.s;
  document.getElementById('wrd-jp').textContent = '🇯🇵 ' + d.j;

  for (var i = 0; i < show; i++) {

function wrdSpeak() {
  var d = wrdFiltered[wrdIdx % wrdFiltered.length];

  var v = getVoice();
  var u1 = new SpeechSynthesisUtterance(d.w);
  u1.lang = 'en-US'; u1.rate = 0.65; u1.pitch = 1.1; if (v) u1.voice = v;
  u1.onstart = function() { document.querySelectorAll('#wrd-wv .wb').forEach(function(b){b.classList.add('a');}); };

      speechSynthesis.speak(u2);

/* ─────────────────────────────────────────
   SRS  忘却曲線
───────────────────────────────────────── */
var SRS_INT = [1,2,4,8,16,32];
var srsQ = [], srsCur = null;

function srsAdd(word, jp, example) {
  if (srsDB[word]) return;
  srsDB[word] = { jp:jp, ex:example, lv:0, next:Date.now()+86400000 };
  srsSave(); updateSRSBadge();
}

function srsSave() { localStorage.setItem('ej2_srs', JSON.stringify(srsDB)); }

function loadSRS() {
  try { var s=localStorage.getItem('ej2_srs'); if(s) srsDB=JSON.parse(s); } catch(e){}
  updateSRSBadge();
}

function srsDue() {
  var now=Date.now(), c=0;
  Object.values(srsDB).forEach(function(w){ if(w.next<=now) c++; });
  return c;
}

function updateSRSBadge() {
  var n=srsDue(), b=document.getElementById('srs-n');
  if (b) { b.textContent=n; b.style.display=n>0?'flex':'none'; }
}

function openSRS() { loadSRS(); document.getElementById('srs-modal').classList.add('show'); renderSRSHome(); }
function closeSRS() { document.getElementById('srs-modal').classList.remove('show'); }

function renderSRSHome() {
  var now=Date.now();
  var total=Object.keys(srsDB).length;
  var due=srsDue();
  var mastered=Object.values(srsDB).filter(function(w){return w.lv>=5;}).length;
  var items=Object.entries(srsDB).map(function(e){
    var diff=e[1].next-now;
    var badge=diff<=0?'今すぐ':diff<86400000?'今日':Math.ceil(diff/86400000)+'日後';
    var cls=diff<=0?'now':diff<86400000?'tod':'lat';
    return {w:e[0], jp:e[1].jp, badge:badge, cls:cls, diff:diff};
  }).sort(function(a,b){return a.diff-b.diff;});

  var html = '<div class="srs-stats">' +
    '<div class="srs-stat"><div class="srs-n">'+total+'</div><div class="srs-l">総単語数</div></div>' +
    '<div class="srs-stat"><div class="srs-n" style="color:#ef9a9a">'+due+'</div><div class="srs-l">復習待ち</div></div>' +
    '<div class="srs-stat"><div class="srs-n" style="color:#a5d6a7">'+mastered+'</div><div class="srs-l">マスター</div></div>' +
  '</div>';

  if (due > 0) {
    html += '<button class="srs-start" onclick="startSRS()">🚀 ' + due + ' 単語を今すぐ復習</button>';
  } else {
    html += '<div style="text-align:center;padding:18px;color:rgba(255,255,255,.4);font-weight:700">' +
      '✅ 今日の復習完了！<br><span style="font-size:12px;opacity:.7">📖 単語学習で新単語を追加しよう</span></div>';
  }

  if (items.length > 0) {
    html += '<div style="font-size:11px;font-weight:800;color:rgba(255,255,255,.3);margin:12px 0 8px;letter-spacing:.5px">📋 単語リスト</div>' +
      '<div class="srs-list">';
    items.forEach(function(item) {
      html += '<div class="srs-item">' +
        '<div class="srs-word">' + item.w + '</div>' +
        '<div class="srs-jp">' + item.jp + '</div>' +
        '<span class="srs-badge ' + item.cls + '">' + item.badge + '</span></div>';
    });
    html += '</div>';
  } else {
    html += '<div style="text-align:center;padding:36px;color:rgba(255,255,255,.3)">' +
      '<div style="font-size:44px;margin-bottom:12px">📖</div>' +
      '📖 単語学習ボタンから<br>単語を覚えるとここに表示されます</div>';
  }
  document.getElementById('srs-body').innerHTML = html;
}

function startSRS() {
  var now = Date.now();
  srsQ = Object.entries(srsDB).filter(function(e){return e[1].next<=now;}).map(function(e){return e[0];});
  srsQ.sort(function(){return Math.random()-.5;});
  nextSRSCard();
}

function nextSRSCard() {
  if (srsQ.length === 0) { renderSRSHome(); addXP(20); appendSys('🎉 復習完了！+20XP'); return; }
  srsCur = srsQ.shift();
  var d = srsDB[srsCur], rem = srsQ.length+1;
  var html = '<div style="font-size:11px;color:rgba(255,255,255,.3);margin-bottom:9px;font-weight:700">残り ' + rem + ' 問</div>' +
    '<div class="srs-card">' +
      '<div class="srs-q">' + srsCur + '</div>' +
      '<div class="srs-hint">日本語の意味は？</div>' +
      '<button class="srs-see" onclick="showSRSAns()">答えを見る</button>' +
    '</div>' +
    '<div class="srs-ans" id="srs-ans">' +
      '<div class="srs-aw">' + srsCur + '</div>' +
      '<div class="srs-aj">🇯🇵 ' + (d.jp||'—') + '</div>' +
      '<div class="srs-ae">' + (d.ex||'') + '</div>' +
      '<div class="srs-rate">' +
        '<button class="srs-rb h" onclick="rateSRS(\'h\')">😓 難しい</button>' +
        '<button class="srs-rb o" onclick="rateSRS(\'o\')">😊 まあまあ</button>' +
        '<button class="srs-rb e" onclick="rateSRS(\'e\')">😄 簡単！</button>' +
      '</div></div>';
  document.getElementById('srs-body').innerHTML = html;
  var u = new SpeechSynthesisUtterance(srsCur);
  u.lang='en-US'; u.rate=0.72; var v=getVoice(); if(v) u.voice=v;
  speechSynthesis.speak(u);
}

function showSRSAns() {
  var a = document.getElementById('srs-ans'); if(a) a.classList.add('show');
}

function rateSRS(r) {
  if (!srsCur) return;
  var d = srsDB[srsCur];
  d.lv = r==='e' ? Math.min(d.lv+2,5) : r==='o' ? Math.min(d.lv+1,5) : Math.max(d.lv-1,0);
  d.next = Date.now() + (SRS_INT[d.lv]||1)*86400000;
  srsSave(); updateSRSBadge();
  if (r==='e') { playSuccess(); flashCorrect(); launchConfetti(window.innerWidth/2,window.innerHeight/2,25); addXP(10); }
  else if (r==='o') { playBeep(440,0.15); addXP(5); }
  else { playBeep(220,0.2,'sawtooth'); addXP(2); }
  setTimeout(nextSRSCard, 220);
}

  '</div>' +
  '<div class="rep-card">' +
    '<div class="rep-card-title">📚 カテゴリ別習熟度</div>' +
    catArr.map(function(c) {
      var cls = c.pct>=70?'g':c.pct>=40?'b':'p';
      return sk(c.name+' ('+c.l+'/'+c.t+')', cls, c.pct);
    }).join('') +
  '</div>' +
  '<div class="rep-card">' +
    '<div class="rep-card-title">🎯 優先学習分野</div>' +
    '<div style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:10px">習熟度が低い分野を優先しましょう</div>' +
    weak.map(function(c) {
      return '<div class="focus-item">' +
        '<span class="tip-icon">📌</span>' +
        '<div><div style="font-weight:800;color:#d0e4ff;margin-bottom:3px">'+c.name+'</div>' +
        '<div style="font-size:12px;color:rgba(255,255,255,.35)">習熟度 '+c.pct+'% ('+c.l+'/'+c.t+'語)</div></div>' +
      '</div>';
    }).join('') +
  '</div>' +
  '<div class="rep-card">' +
    '<div class="rep-card-title">💡 ARIAからのアドバイス</div>' +
    tip('🔁','復習バッジに数字が出たら必ず復習！忘却曲線が英語習得の鍵です') +
    (weak[0] ? tip('📖','「'+weak[0].name+'」カテゴリを重点的に練習しましょう') : '') +
    (due>0 ? tip('⚠️','今日の復習が '+due+' 単語 たまっています') : '') +
    tip('🎤','声に出す練習が最も効果的。マイクボタンを積極的に使いましょう') +
    tip('✨','AIストーリー生成で覚えた単語を文脈の中で復習しよう') +
  '</div>';
}

var CFI_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'];

function launchConfetti(x, y, n) {
  var wrap = document.createElement('div');
  wrap.className = 'cfi-wrap'; document.body.appendChild(wrap);
  for (var i=0;i<(n||40);i++) {
    var p = document.createElement('div');
    p.className = 'cfi';
    var size = 6+Math.random()*8;
    var sx = (x||window.innerWidth/2) + (Math.random()-.5)*200;
    p.style.cssText = 'left:'+sx+'px;top:'+(y||100)+'px;width:'+size+'px;height:'+size+'px;' +
      'background:'+CFI_COLORS[Math.floor(Math.random()*CFI_COLORS.length)]+';' +
      'border-radius:'+(Math.random()>.5?'50%':'2px')+';' +
      'animation-duration:'+(1.5+Math.random()*1.5)+'s;animation-delay:'+(Math.random()*.5)+'s';
    wrap.appendChild(p);
  }
  setTimeout(function(){wrap.remove();}, 3500);
}

function showXPPop(n) {
  var el = document.createElement('div');
  el.className = 'xp-pop';
  el.textContent = '+' + n + ' XP ⚡';
  el.style.cssText = 'right:20px;top:60px';
  document.body.appendChild(el);
  setTimeout(function(){el.remove();}, 1300);
}

function flashCorrect() {
  var el = document.createElement('div');
  el.className = 'flash'; document.body.appendChild(el);
  setTimeout(function(){el.remove();}, 500);
}

function playBeep(freq, dur, type) {
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type||'sine'; osc.frequency.value = freq||440;
    gain.gain.setValueAtTime(0.13, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+(dur||0.3));
    osc.start(); osc.stop(ctx.currentTime+(dur||0.3));
  } catch(e){}
}

function playCoin() { playBeep(880,0.07,'square'); setTimeout(function(){playBeep(1109,0.1,'square');},80); }
function playSuccess() {
  [523,659,784].forEach(function(f,i){setTimeout(function(){playBeep(f,.12);},i*100);});
}
function playLevelUp() {
  [523,659,784,1047].forEach(function(f,i){setTimeout(function(){playBeep(f,.2,'triangle');},i*110);});
}

function getLearned(max) {
  var keys = Object.keys(srsDB);
  var recent = keys.slice(-4);
  var others = keys.filter(function(k){return recent.indexOf(k)<0;});
  others.sort(function(){return Math.random()-.5;});
  return recent.concat(others).slice(0, max||8);
}

function resizeTA(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
}
